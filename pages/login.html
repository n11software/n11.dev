<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Created and designed by Levi Hicks -->
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N11 - Login</title>
    <link rel="stylesheet" href="/login.css"/>
    <link rel="icon" type="image/png" href="/favicon-48x48.png" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="N11" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div class="center">
      <div>
        <span class="title">Login</span>
        <div class="codes">
          <input type="number" id="0">
          <input type="number" id="1">
          <input type="number" id="2">
          <input type="number" id="3">
          <input type="number" id="4">
          <input type="number" id="5">
        </div>
        <span class="description">Visit <a href="https://n11.dev/link">n11.dev/link</a> on your logged in device.</span>
        <span class="signup">Don't have an account? <a href="/signup">Sign up.</a></span>
      </div>
    </div>
    <script type="text/javascript" src="/cache/animations.js"></script>
    <script>
      let zero = document.getElementById("0")
      let one = document.getElementById("1")
      let two = document.getElementById("2")
      let three = document.getElementById("3")
      let four = document.getElementById("4")
      let five = document.getElementById("5")

      zero.onkeydown = e => {
        if (zero.value.length === 1 && e.key !== 'Backspace') e.preventDefault()
        if (e.key >= '0' && e.key <= '9') {
          e.preventDefault()
          zero.value = e.key
          one.focus()
        }
      }

      let meta_paste = (e) => {
        e.preventDefault()
        zero.value = e.clipboardData.getData('text')[0]
        one.focus()
        one.value = e.clipboardData.getData('text')[1]
        two.focus()
        two.value = e.clipboardData.getData('text')[2]
        three.focus()
        three.value = e.clipboardData.getData('text')[3]
        four.focus()
        four.value = e.clipboardData.getData('text')[4]
        five.focus()
        five.value = e.clipboardData.getData('text')[5]
      }

      let meta = (prev, t, next, e) => {
        if (t.value.length === 1 && e.key !== 'Backspace') e.preventDefault()
        if (t.value.length === 0 && e.key === 'Backspace') {
          prev.focus()
        }
        if (e.key >= '0' && e.key <= '9') {
          e.preventDefault()
          t.value = e.key
          next.focus()
        }
      }

      one.onkeydown = e => meta(zero, one, two, e)
      two.onkeydown = e => meta(one, two, three, e)
      three.onkeydown = e => meta(two, three, four, e)
      four.onkeydown = e => meta(three, four, five, e)
      five.onkeydown = e => meta(four, five, five, e)

      zero.addEventListener('paste', meta_paste)
      one.addEventListener('paste', meta_paste)
      two.addEventListener('paste', meta_paste)
      three.addEventListener('paste', meta_paste)
      four.addEventListener('paste', meta_paste)
      five.addEventListener('paste', meta_paste)
    </script>
  </body>
</html>

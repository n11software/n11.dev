<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Created and designed by Levi Hicks -->
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N11 - Login</title>
    <link rel="stylesheet" href="/login.css"/>
    <link rel="icon" type="image/png" href="/favicon-48x48.png" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="N11" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div class="center">
      <div>
        <span class="title">Login</span>
        <div class="items" id="items">
          <span class="scanning">Scanning network</span>
        </div>
        <span class="description">Visit <a href="https://n11.dev/link">n11.dev/link</a> on your logged in device.</span>
        <span class="signup">Don't have an account? <a href="/signup">Sign up.</a></span>
      </div>
    </div>

    <script>
      let scanning = document.querySelector('.scanning')
      let scanningText = document.querySelector('.scanning').innerText
      let computer = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
            </svg>`
      let mobile = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
            </svg>`
      setInterval(async () => {
        let res = await fetch('/api/link/scan')
        // console.log(await res.json())
        document.querySelector('#items').innerHTML = ""
        Object.entries(await res.json()).forEach(e => {
          console.log(e[1])
          let entry = document.createElement('div')
          entry.innerHTML = e[1]==0?mobile:computer
          let span = document.createElement('span')
          span.innerText = e[0] + "@n11.dev"
          entry.appendChild(span)
          document.querySelector('#items').appendChild(entry)
        })
      }, 1000)
    </script>
    <script type="text/javascript" src="/cache/animations.js"></script>
  </body>
</html>
